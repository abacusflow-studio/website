services:
  abacusflow-website:
    container_name: abacusflow-website
    image: ghcr.io/abacusflow/website:${ABACUSFLOW_WEBSITE_VERSION}
    networks:
      - abacusflow-network
    volumes:
      - /etc/letsencrypt/live/abacusflow.cn/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/abacusflow.cn/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    ports:
      - "80:80"
      - "443:443"